{% load static %}

<!DOCTYPE html>
<html>
<head>

<title>Add Food</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
padding:40px;
}

.container{
width:400px;
margin:auto;
background:white;
padding:20px;
border-radius:8px;
box-shadow:0px 0px 10px #ccc;
}

h2{
text-align:center;
}

input,textarea{
width:100%;
padding:10px;
margin:10px 0;
}

button{
background:#28a745;
color:white;
border:none;
padding:10px;
width:100%;
cursor:pointer;
}

button:hover{
background:#218838;
}

</style>

</head>

<body>

<div class="container">

<h2>Add New Food</h2>

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

{{ form.as_p }}

<button type="submit">Add Food</button>

</form>

</div>

</body>
</html>
