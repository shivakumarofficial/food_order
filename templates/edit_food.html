{% extends 'admin_dashboard.html' %}

{% block content %}

<style>

.edit-container{
width:400px;
margin:40px auto;
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
font-family:Arial, sans-serif;
}

.edit-container h2{
text-align:center;
margin-bottom:20px;
color:#333;
}

.edit-container form p{
margin-bottom:15px;
}

.edit-container input,
.edit-container textarea,
.edit-container select{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:4px;
margin-top:5px;
}

.update-btn{
width:100%;
padding:10px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

.update-btn:hover{
background:#0056b3;
}

</style>

<div class="edit-container">

<h2>Edit Food</h2>

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

{{ form.as_p }}

<button type="submit" class="update-btn">Update Food</button>

</form>

</div>

{% endblock %}
