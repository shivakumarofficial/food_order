<h2>Users</h2>
<style>

body{
    font-family: Arial, sans-serif;
    background-color:#f4f4f4;
}

h2{
    text-align:center;
    color:#333;
    margin-top:20px;
}

table{
    width:60%;
    margin:30px auto;
    border-collapse:collapse;
    background-color:white;
}

th, td{
    padding:12px;
    text-align:left;
    border:1px solid #ddd;
}

th{
    background-color:#007bff;
    color:white;
}

tr:nth-child(even){
    background-color:#f2f2f2;
}

tr:hover{
    background-color:#e6f2ff;
}

</style>
<table border="1">

<tr>
<th>Username</th>
<th>Email</th>
</tr>

{% for user in users %}

<tr>
<td>{{user.username}}</td>
<td>{{user.email}}</td>
</tr>

{% endfor %}

</table>
