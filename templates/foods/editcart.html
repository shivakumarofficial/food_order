{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">
  <h4>Edit Cart Item</h4>

  <div class="card p-3">

    <p><strong>Food Name:</strong> {{ cart_item.name }}</p>
    <p><strong>Unit Price:</strong> ₹{{ cart_item.price }}</p>
    <p><strong>Rating:</strong> {{ cart_item.rating }}</p>

    <form method="POST">
      {% csrf_token %}

      <div class="mb-3">
        {{ eCart.quantity.label_tag }}
        {{ eCart.quantity }}
      </div>

      <button type="submit" class="btn btn-primary">
        Update
      </button>

      <a href="{% url 'cart' %}" class="btn btn-secondary ms-2">
        Cancel
      </a>
    </form>

  </div>
</div>

{% endblock %}
